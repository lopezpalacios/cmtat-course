<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMTAT Engineering Course</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --bd:#30363d; --fg:#c9d1d9; --acc:#2f81f7; --ok:#3fb950; --err:#f85149; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.55 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); display:flex; height:100vh; }
  #side { width:300px; border-right:1px solid var(--bd); overflow:auto; background:var(--panel); padding:8px; }
  #side h2 { font-size:13px; text-transform:uppercase; color:#8b949e; margin:14px 6px 4px; }
  #side a { display:block; padding:4px 8px; color:var(--fg); text-decoration:none; border-radius:5px; cursor:pointer; }
  #side a:hover { background:#21262d; } #side a.active { background:var(--acc); color:#fff; }
  #main { flex:1; overflow:auto; padding:24px 32px; max-width:900px; }
  pre { background:#0b0f14; border:1px solid var(--bd); border-radius:6px; padding:10px; overflow:auto; }
  code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  textarea { width:100%; height:200px; background:#0b0f14; color:var(--fg); border:1px solid var(--bd); border-radius:6px; padding:10px; font-family:ui-monospace,monospace; font-size:13px; }
  .step { border:1px solid var(--bd); border-radius:8px; padding:14px 16px; margin:14px 0; background:var(--panel); }
  .step h4 { margin:0 0 8px; } .muted { color:#8b949e; }
  button { background:var(--acc); color:#fff; border:0; border-radius:6px; padding:7px 13px; cursor:pointer; font-size:13px; margin-right:8px; }
  button.ghost { background:#21262d; color:var(--fg); border:1px solid var(--bd); }
  .verdict { margin-top:8px; font-weight:600; } .verdict.ok { color:var(--ok); } .verdict.err { color:var(--err); }
  .locked { opacity:.45; pointer-events:none; }
  .tag { display:inline-block; font-size:11px; background:#21262d; border:1px solid var(--bd); border-radius:10px; padding:1px 8px; margin-left:6px; color:#8b949e; }
</style>
</head>
<body>
<nav id="side"></nav>
<main id="main"><p class="muted">Loading…</p></main>
<script>
let COURSE=null, cur=0;
const $=(s,e=document)=>e.querySelector(s);

fetch('course.json').then(r=>r.json()).then(d=>{COURSE=d; renderSide(); show(0);})
  .catch(e=>$('#main').innerHTML='<p class="verdict err">Could not load course.json. Run: python3 pm/build_player.py</p>');

function renderSide(){
  const s=$('#side');
  s.innerHTML='<h2>Chapters</h2>';
  COURSE.chapters.forEach((c,i)=>{
    const a=document.createElement('a');
    a.textContent=c.title.replace(/^Chapter\s+/,''); a.dataset.i=i;
    a.onclick=()=>show(i); s.appendChild(a);
  });
}
function show(i){
  cur=i; const c=COURSE.chapters[i];
  document.querySelectorAll('#side a').forEach(a=>a.classList.toggle('active',+a.dataset.i===i));
  const m=$('#main'); m.scrollTop=0;
  let h=`<h1>${esc(c.title)}</h1>`;
  c.lessons.forEach(l=>{
    h+=`<h2>Lesson ${esc(l.n)} — ${esc(l.title)}</h2>`;
    l.steps.forEach((st,si)=>{
      h+=stepHTML(c,l,st,si);
    });
  });
  m.innerHTML=h||'<p class="muted">No lessons parsed.</p>';
}
function stepHTML(c,l,st,si){
  const sid=`s_${c.file}_${st.id}`.replace(/[^\w]/g,'_');
  return `<div class="step" id="${sid}" data-id="${esc(st.id)}">
    <h4>Step ${esc(st.id)} — ${esc(st.title)} ${st.checker?'<span class="tag">check</span>':''}</h4>
    <p>${esc(st.instruction)}</p>
    <details class="muted"><summary>Why</summary><p>${esc(st.explanation)}</p></details>
    <textarea spellcheck="false">${esc(st.starter||'')}</textarea>
    <div style="margin-top:8px">
      <button data-act="check">Check</button>
      <button class="ghost" data-act="sol">Show solution</button>
    </div>
    <div class="verdict" data-v></div>
    <pre data-sol hidden><code>${esc(st.solution||'')}</code></pre>
  </div>`;
}
// event delegation
document.addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  const step=b.closest('.step'); if(!step) return;
  const act=b.dataset.act;
  const ta=$('textarea',step), v=$('[data-v]',step), sol=$('[data-sol]',step);
  const data=findStep(step.dataset.id);
  if(act==='sol'){ sol.hidden=!sol.hidden; b.textContent=sol.hidden?'Show solution':'Hide solution'; }
  if(act==='check'){
    if(!data||!data.checker){ v.textContent='No checker for this step — self-check against the solution.'; v.className='verdict muted'; return; }
    const ok=runChecker(data.checker, ta.value);
    v.textContent= ok? '✓ Passed' : ('✗ '+(data.checker.error_hint||'Not matching yet.'));
    v.className='verdict '+(ok?'ok':'err');
  }
});
function findStep(id){
  const c=COURSE.chapters[cur];
  for(const l of c.lessons) for(const s of l.steps) if(s.id===id) return s;
  return null;
}
function runChecker(chk,buf){
  if(chk.type!=='regex') return true;
  try{ return new RegExp(chk.pattern, (chk.flags||'m').includes('m')?'m':'').test(buf); }
  catch(e){ return false; }
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function cssesc(s){ return String(s).replace(/[^\w-]/g,'_'); }
</script>
</body>
</html>
