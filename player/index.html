<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMTAT Engineering Course</title>
<style>
:root{
  --bg:#FFFFFF; --bg-side:#FAFAF9; --surface:#FFFFFF; --surface-sunk:#F6F6F5;
  --ink:#0A0A0A; --ink-2:#52524E; --ink-3:#8A8A85;
  --line:#E4E4E1; --line-strong:#CFCFCB;
  --red:#C8102E; --red-hover:#A50D26; --red-active:#85091E; --red-wash:#FBEEF0;
  --ok:#1E7A46; --ok-wash:#EBF4EF;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,"Cascadia Mono",Consolas,monospace;
  --maxw:760px; --side-w:300px; --radius:6px; --radius-sm:4px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{margin:0;font:16px/1.65 var(--font-ui);color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);}
.tnum{font-variant-numeric:tabular-nums;}

/* masthead */
.masthead{display:flex;align-items:center;justify-content:space-between;height:64px;
  padding:0 28px;background:var(--bg);border-bottom:2px solid var(--red);
  box-shadow:0 1px 0 var(--line);flex:0 0 auto;}
.masthead .brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;}
.masthead .mark{font-weight:600;font-size:18px;letter-spacing:-.01em;}
.progress{display:flex;align-items:center;gap:12px;}
.progress .count{color:var(--ink-2);}
.progress .track{width:160px;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.progress .fill{height:100%;width:0;background:var(--red);transition:width .3s ease;}

/* shell */
.shell{display:flex;flex:1;overflow:hidden;}
#side{width:var(--side-w);background:var(--bg-side);border-right:1px solid var(--line);
  overflow:auto;padding:16px 0;flex:0 0 auto;}
#side .grp{margin:14px 16px 4px;display:flex;justify-content:space-between;align-items:center;}
#side a{display:flex;justify-content:space-between;gap:8px;padding:9px 16px 9px 14px;
  color:var(--ink-2);text-decoration:none;cursor:pointer;border-left:2px solid transparent;font-size:14.5px;}
#side a:hover{color:var(--ink);border-left-color:var(--line-strong);}
#side a.active{color:var(--ink);font-weight:600;background:var(--red-wash);border-left:2px solid var(--red);}
#side a .badge{font-size:11px;color:var(--ink-3);}
#side a.complete .badge{color:var(--ok);}
#side a.dim{opacity:.5;}
#main{flex:1;overflow:auto;padding:36px 40px 80px;}
.col{max-width:var(--maxw);margin:0 auto;}

h1{font-size:30px;font-weight:600;letter-spacing:-.01em;margin:0;}
h1.kick::after{content:"";display:block;width:40px;height:2px;background:var(--red);margin:14px 0 0;}
h2.lesson{font-size:21px;font-weight:600;margin:38px 0 8px;padding-top:22px;border-top:1px solid var(--line);}
.muted{color:var(--ink-2);} .small{font-size:14px;}
.chip{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-2);border:1px solid var(--line);border-radius:2px;padding:2px 8px;margin-right:6px;}

/* cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin:18px 0;}
.headcard{background:var(--bg-side);}
.headcard .meta{margin-top:10px;}
.headcard .builds{margin-top:10px;font-size:14px;color:var(--ink-2);}

/* step */
.step{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin:16px 0;}
.step.locked{opacity:.45;}
.step.done{padding:12px 18px;background:var(--bg-side);}
.step h4{margin:0;font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.step .tag{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);
  border:1px solid var(--line);border-radius:2px;padding:2px 8px;white-space:nowrap;}
.step.done .tag{color:var(--ok);border-color:var(--ok);background:var(--ok-wash);}
.step.reveal .tag{color:#9A6B00;border-color:#E3C77A;background:#FBF3DF;}
.step .instr{margin:12px 0;}
details.why{margin:10px 0;}
details.why summary{cursor:pointer;color:var(--ink-2);font-weight:600;font-size:14px;}
details.why .body{color:var(--ink-2);margin-top:8px;}
textarea{width:100%;min-height:230px;resize:vertical;margin-top:10px;background:var(--surface-sunk);
  color:var(--ink);border:1px solid var(--line-strong);border-radius:var(--radius-sm);
  padding:14px;font:400 13.5px/1.6 var(--font-mono);}
textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.18);}
.codelabel{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-top:10px;}
pre{background:var(--surface-sunk);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px;overflow:auto;margin:10px 0 0;}
code{font:400 13.5px/1.6 var(--font-mono);}

.actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;}
button{font:600 14px/1 var(--font-ui);letter-spacing:.01em;padding:10px 18px;border-radius:var(--radius-sm);
  cursor:pointer;border:1px solid var(--red);background:var(--red);color:#fff;transition:background .12s ease;}
button:hover{background:var(--red-hover);border-color:var(--red-hover);}
button:active{background:var(--red-active);transform:translateY(1px);}
button.ghost{background:var(--surface);color:var(--ink);border-color:var(--line-strong);}
button.ghost:hover{background:var(--surface-sunk);border-color:var(--ink);}
button:focus-visible{outline:3px solid var(--red);outline-offset:2px;}
button:disabled{opacity:.4;cursor:not-allowed;}

.verdict{margin-top:12px;padding:10px 14px;font-weight:600;font-size:15px;border-left:3px solid var(--line);color:var(--ink-2);}
.verdict.ok{color:var(--ok);background:var(--ok-wash);border-left-color:var(--ok);}
.verdict.err{color:var(--red);background:var(--red-wash);border-left-color:var(--red);}
.hintbox{margin-top:10px;padding:10px 14px;border-left:3px solid var(--line-strong);background:var(--bg-side);color:var(--ink-2);font-size:14.5px;}

/* mastery bar */
.mastery{display:flex;align-items:center;gap:12px;margin:14px 0 0;}
.mastery .bar{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.mastery .bar .f{height:100%;background:var(--ok);}
.mastery .bar .r{height:100%;background:#E3C77A;}

/* landing */
.hero{padding:10px 0 4px;}
.hero h1{font-size:34px;}
.lead{font-size:18px;color:var(--ink-2);margin:14px 0 0;max-width:62ch;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px;}
.tile{border:1px solid var(--line);border-radius:var(--radius);padding:16px;background:var(--surface);}
.tile h4{margin:0 0 6px;}
table.map{border-collapse:collapse;width:100%;margin-top:8px;font-size:14.5px;}
table.map td{border-top:1px solid var(--line);padding:7px 10px;vertical-align:top;}
table.map td:first-child{color:var(--ink-2);white-space:nowrap;}
.cta{margin-top:22px;display:flex;gap:12px;align-items:center;}

/* quiz */
.q{margin:18px 0;padding-bottom:6px;}
.opt{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:10px 14px;margin:8px 0;cursor:pointer;background:var(--surface);}
.opt:hover{border-color:var(--line-strong);}
.opt.sel{border-color:var(--red);background:var(--red-wash);}
.opt.correct{border-color:var(--ok);background:var(--ok-wash);}
.opt.wrong{border-color:var(--red);background:var(--red-wash);}
.opt .k{font-weight:600;text-transform:uppercase;}
.rationale{font-size:14.5px;color:var(--ink-2);margin-top:6px;border-left:3px solid var(--line);padding-left:12px;}

/* celebration */
.celebrate{text-align:center;padding:40px 0;}
.celebrate .big{font-size:26px;font-weight:600;}
.celebrate .red{color:var(--red);}

/* highlighted-textarea editor overlay */
.editor{position:relative;margin-top:10px;}
.editor pre.hl,.editor textarea{margin:0;padding:14px;border-radius:var(--radius-sm);
  font:400 13.5px/1.6 var(--font-mono);width:100%;min-height:230px;white-space:pre;
  overflow:auto;tab-size:2;letter-spacing:0;box-sizing:border-box;}
.editor pre.hl{position:absolute;inset:0;background:var(--surface-sunk);z-index:0;
  pointer-events:none;border:1px solid var(--line-strong);color:var(--ink);}
.editor pre.hl code{font:inherit;white-space:inherit;background:none;padding:0;}
.editor textarea{position:relative;z-index:1;background:transparent;color:transparent;
  caret-color:var(--red);border:1px solid transparent;resize:vertical;}
.editor textarea:focus{outline:none;}
.editor:focus-within pre.hl{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.18);}

/* Prism — Swiss palette (light) */
code[class*="language-"],pre[class*="language-"]{color:var(--ink);text-shadow:none;}
.token.comment,.token.prolog,.token.doctype,.token.cdata{color:var(--ink-3);font-style:italic;}
.token.punctuation,.token.operator,.token.entity,.token.url{color:var(--ink-2);}
.token.keyword,.token.boolean,.token.atrule,.token.important{color:var(--red);font-weight:600;}
.token.string,.token.char,.token.attr-value,.token.inserted{color:#1E7A46;}
.token.number,.token.constant,.token.symbol{color:#9A6B00;}
.token.function,.token.class-name{color:#85091E;font-weight:600;}
.token.builtin,.token.property,.token.attr-name,.token.tag{color:#0A4A6E;}

/* motion */
@keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.step.active{animation:cardIn .28s ease both;}
.hero,.celebrate,.hintbox{animation:cardIn .3s ease both;}
@keyframes pop{0%{transform:scale(.97);}55%{transform:scale(1.02);}100%{transform:scale(1);}}
.verdict.ok{animation:pop .32s ease;}
@keyframes shake{10%,90%{transform:translateX(-1px);}20%,80%{transform:translateX(2px);}
  30%,50%,70%{transform:translateX(-3px);}40%,60%{transform:translateX(3px);}}
.verdict.err{animation:shake .4s ease;}
.opt{transition:border-color .12s ease,background .12s ease;}

/* editor: highlight layer must not be selectable (prevents doubled text on copy) */
.editor pre.hl{user-select:none;-webkit-user-select:none;}

/* slide deck */
.slidebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px;}
.cbar{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:20px;}
.cbar .cfill{height:100%;background:var(--red);transition:width .35s ease;}
.slidenav{display:flex;justify-content:space-between;margin-top:26px;gap:12px;
  border-top:1px solid var(--line);padding-top:18px;}
.slidenav button{min-width:140px;}
@keyframes nudge{0%,100%{transform:translateX(0);}50%{transform:translateX(5px);}}
.slidenav button[data-nav=next].ready{animation:nudge .9s ease 3;}

/* concept animation card */
.concept{border:1px solid var(--line);border-radius:var(--radius);background:var(--bg-side);
  padding:16px 18px;margin:4px 0 20px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.concept svg{flex:0 0 auto;}
.concept .cap{font-size:14.5px;color:var(--ink-2);flex:1;min-width:220px;}
.concept .cap b{color:var(--ink);font-weight:600;}
.flow{stroke-dasharray:6 6;animation:dash 1.1s linear infinite;}
@keyframes dash{to{stroke-dashoffset:-24;}}
.travel{animation:travel 2.6s ease-in-out infinite;}
@keyframes travel{0%{transform:translateX(0);opacity:0;}12%{opacity:1;}88%{opacity:1;}100%{transform:translateX(64px);opacity:0;}}
.tick{animation:tick 2.6s ease-in-out infinite;transform-origin:center;}
@keyframes tick{0%,55%{opacity:0;transform:scale(.6);}70%{opacity:1;transform:scale(1);}100%{opacity:1;}}
.glow{animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{opacity:.4;}50%{opacity:1;}}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
@media (max-width:820px){#side{display:none;}#main{padding:24px 18px 70px;}}
</style>
</head>
<body>
<header class="masthead">
  <div class="brand" onclick="goLanding()">
    <span class="mark">CMTAT</span><span class="eyebrow">Engineering Course</span>
  </div>
  <div class="progress" id="mprog"></div>
</header>
<div class="shell">
  <nav id="side"></nav>
  <main id="main"><p class="muted">Loading…</p></main>
</div>
<script>window.Prism={manual:true};</script>
<script src="vendor/prism.js"></script>
<script src="vendor/confetti.browser.min.js"></script>
<script>
const LS="cmtat.v2";
let C=null, P=loadP();
function loadP(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}} }
function saveP(){ localStorage.setItem(LS, JSON.stringify(P)); }
P.step=P.step||{};       // stepId -> 'pass' | 'reveal'
P.code=P.code||{};       // stepId -> editor text
P.quiz=P.quiz||{};       // chapterNn -> {score,total}
P.track=P.track||null;   // 'A'|'B'|'C'
const $=(s,e=document)=>e.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

fetch('course.json').then(r=>r.json()).then(d=>{C=d; route();})
  .catch(()=>$('#main').innerHTML='<p class="verdict err">Could not load course.json — run python3 pm/build_player.py</p>');

/* ---------- progress helpers ---------- */
const allSteps=c=>c.lessons.flatMap(l=>l.steps);
function chDone(c){ const s=allSteps(c); const passed=s.filter(st=>P.step[st.id]).length;
  const quizOk = !c.quiz.length || (P.quiz[c.nn]&&P.quiz[c.nn].done);
  return s.length>0 && passed===s.length && quizOk; }
function chCounts(c){ const s=allSteps(c); let pass=0,rev=0;
  s.forEach(st=>{if(P.step[st.id]==='pass')pass++; else if(P.step[st.id]==='reveal')rev++;});
  return {pass,rev,total:s.length}; }
function overall(){ let done=0,tot=0; C.chapters.forEach(c=>{tot+=allSteps(c).length;
  done+=allSteps(c).filter(st=>P.step[st.id]).length;}); return {done,tot}; }

/* ---------- routing ---------- */
function route(){
  renderSide(); renderMast();
  const h=location.hash;
  let m;
  if((m=h.match(/^#\/ch\/(\d+)\/quiz/))) return renderQuiz(idxByNn(+m[1]));
  if((m=h.match(/^#\/ch\/(\d+)\/done/))) return renderComplete(idxByNn(+m[1]));
  if((m=h.match(/^#\/ch\/(\d+)/))) return renderChapter(idxByNn(+m[1]));
  if(h==='#/track') return renderTrackChoice();
  if(h==='#/guide') return renderGuide();
  if(h==='#/glossary') return renderGlossary();
  if(h==='#/teacher') return renderTeacher();
  return renderLanding();
}
window.addEventListener('hashchange',route);
const idxByNn=nn=>C.chapters.findIndex(c=>c.nn===nn);
function goLanding(){ location.hash=''; }
function go(hash){ location.hash=hash; $('#main').scrollTop=0; window.scrollTo(0,0); }

/* ---------- masthead ---------- */
function renderMast(){
  const o=overall(); const pct=o.tot?Math.round(o.done/o.tot*100):0;
  $('#mprog').innerHTML=`<span class="count eyebrow tnum">${pct}% complete</span>
    <span class="track"><span class="fill" style="width:${pct}%"></span></span>`;
}

/* ---------- sidebar ---------- */
function renderSide(){
  const s=$('#side'); let h='';
  C.parts.forEach(part=>{
    const isTrack = part.track!=='shared';
    const dim = isTrack && P.track && P.track!==part.track;
    h+=`<div class="grp"><span class="eyebrow">${esc(part.title)}</span></div>`;
    part.chapters.forEach(ci=>{
      const c=C.chapters[ci]; const cc=chCounts(c); const done=chDone(c);
      const cur=location.hash.startsWith('#/ch/'+c.nn);
      h+=`<a class="${cur?'active':''} ${done?'complete':''} ${dim?'dim':''}" onclick="go('#/ch/${c.nn}')">
        <span>${esc(c.title.replace(/^Chapter\s+/,'Ch '))}</span>
        <span class="badge tnum">${done?'✓':cc.pass+cc.rev+'/'+cc.total}</span></a>`;
    });
  });
  h+=`<div class="grp"><span class="eyebrow">Reference</span></div>
    <a class="${location.hash==='#/guide'?'active':''}" onclick="go('#/guide')"><span>For Java delivery engineers</span></a>
    <a class="${location.hash==='#/glossary'?'active':''}" onclick="go('#/glossary')"><span>Glossary</span></a>
    <a onclick="go('#/teacher')"><span>Teacher notes 🔒</span></a>`;
  s.innerHTML=h;
}

/* ---------- delivery-engineer guide + glossary (demographic adaptation) ---------- */
const SPRINGMAP=[
 ["Authentication","Gateway sets the <code>Principal</code> on the request","<code>msg.sender</code> — verified by the protocol itself (no JWT/mTLS)"],
 ["Authorization","<code>@PreAuthorize</code> / Spring Security roles","AccessControl roles · CMTAT AuthorizationModule"],
 ["Persistence","JPA entity ↔ table row","Contract storage <code>mapping</code> (the positions table)"],
 ["Transaction / rollback","<code>@Transactional</code> rollback","<code>revert</code> — state reverts, but gas is still paid"],
 ["Eventing","<code>@KafkaListener</code> + committed offsets","Contract <code>event</code> + log subscription with a block cursor"],
 ["Idempotency","<code>Idempotency-Key</code> header / dedupe table","<code>operationId</code> + on-chain topic-filter dedupe"],
 ["Serialization","Jackson DTO ↔ JSON","ABI encode/decode (web3j <code>Function</code>/<code>FunctionReturnDecoder</code>)"],
 ["Money type","<code>BigDecimal</code> + scale","<code>uint256</code> base units + <code>decimals</code> (never <code>double</code>)"],
 ["Build / codegen","Maven + WSDL→stubs","Foundry <code>forge</code> for Solidity · <code>web3j</code> plugin for typed wrappers from the ABI"],
];
const EXAMPLES=[
 ["Currency minor unit","CHF Rappen","INR paise · EUR cent"],
 ["Clearing / rails","SIC (Swiss)","NPCI · UPI · IMPS (India) · TARGET2 / SEPA (EU/CEE)"],
 ["End-to-end reference","ISO 20022 UETR","UPI transaction ref · your <code>operationId</code>"],
 ["Securities depository","SIX SIS","CDSL / NSDL (India) · local CSDs (CEE)"],
];
function renderGuide(){
  $('#main').innerHTML=`<div class="col">
    <h1 class="kick">For Java delivery engineers</h1>
    <p class="lead">This course is written as if you run a Swiss bank's core. Most of you don't — you
    <strong>build to spec</strong> for bank/fintech clients from delivery centres in India and Central/Eastern Europe.
    Read every “you operate X” as “you integrate with the client's X”. Your usual deliverable is the
    off-chain <strong>Java/web3j adapter</strong> (Chapter 8) plus a contract module to a given standard (CMTAT).</p>
    <div class="card"><div class="eyebrow">Map it to the stack you already use</div>
      <table class="map"><thead><tr><td><b>Concern</b></td><td><b>Your Spring/Java world</b></td><td><b>EVM / CMTAT</b></td></tr></thead>
      <tbody>${SPRINGMAP.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</tbody></table></div>
    <div class="card"><div class="eyebrow">Localise the examples</div>
      <table class="map"><thead><tr><td><b>Concept</b></td><td><b>Course (Swiss)</b></td><td><b>Your region</b></td></tr></thead>
      <tbody>${EXAMPLES.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</tbody></table></div>
    <div class="card"><div class="eyebrow">What to deliver for a client</div>
      <p class="small muted" style="margin:8px 0 0">The signer is the compliance question that always comes up: never ship
      <code>Credentials.create("0x…")</code> to production. Back your <code>TransactionManager</code> with the client's HSM/KMS/MPC
      signer. Generate typed contract wrappers from the audited CMTAT ABI with the web3j Maven plugin rather than hand-encoding calls,
      and prove the adapter with a <code>mvn test</code> against a local anvil node before you demo “done”.</p></div>
    <div class="cta"><button onclick="go('#/glossary')">Open the glossary →</button>
      <button class="ghost" onclick="goLanding()">Back to course</button></div></div>`;
}
const GLOSSARY=[
 ["Registrar / transfer agent","Keeps the official register of who owns which shares and processes transfers. On-chain: the role allowed to mint/burn/force-transfer."],
 ["Custody","Safekeeping of assets/keys on a client's behalf. The HSM/MPC question: who holds the signing key."],
 ["Coupon","Periodic interest payment on a bond, computed on a record-date snapshot."],
 ["Par value","The face/nominal value of a bond or share."],
 ["NAV","Net Asset Value — the per-share price of a fund, published daily by the fund accountant (oracle on-chain)."],
 ["Corporate action","An event changing the security: dividend, split, rights issue, buyback, redemption."],
 ["Omnibus account","One account holding many clients' positions commingled (vs segregated)."],
 ["EOD batch","End-of-day batch processing — the bank's nightly settlement/clearing run; analogous to a block."],
 ["HSM","Hardware Security Module — tamper-resistant device that holds keys and signs without exposing them."],
 ["ISO 20022","The global financial-messaging standard (e.g. pain.001 payment initiation); the contract's ABI/events play a similar role."],
 ["Record date / snapshot","A point-in-time freeze of balances used to compute dividends, coupons, or voting power."],
 ["Idempotency key","A unique id (here <code>operationId</code>) that lets a retried instruction execute at most once."],
 ["Finality","When a settlement can no longer be reversed; on-chain, sufficient confirmation depth / the FINALIZED tag."],
 ["Reorg","A chain reorganisation where recent blocks are replaced — a previously-seen tx may no longer be canonical."],
 ["msg.sender","The protocol-verified address that called the current function — your authenticated caller, for free."],
 ["wei","The smallest ETH unit (1e-18); analogous to a currency's minor unit. Use <code>BigInteger</code>, never <code>double</code>."],
 ["DvP","Delivery versus Payment — atomic swap of the security against cash so neither leg settles without the other."],
];
function renderGlossary(){
  $('#main').innerHTML=`<div class="col"><h1 class="kick">Glossary</h1>
    <p class="muted">Finance and EVM terms the course uses. Skim before Chapter 1 if the domain is new to you.</p>

function renderTeacher(){
  $('#main').innerHTML=`<div class="col"><h1 class="kick">Teacher notes 🔒</h1>
    <p class="muted">Private lecture notes for the instructor. The repository stores only ciphertext —
    decryption happens in your browser with the password (PBKDF2 + AES-GCM).</p>
    <div class="card">
      <input id="tpw" type="password" autocomplete="off" placeholder="password"
        style="width:100%;max-width:320px;padding:10px 12px;border:1px solid var(--line-strong);border-radius:var(--radius-sm);font:inherit"
        onkeydown="if(event.key==='Enter')unlockTeacher()"/>
      <div class="actions"><button onclick="unlockTeacher()">Unlock</button></div>
      <div class="verdict" id="tmsg" hidden></div>
    </div>
    <div id="tnotes"></div></div>`;
  setTimeout(()=>{const e=document.getElementById('tpw'); if(e)e.focus();},50);
}
async function unlockTeacher(){
  const pw=(document.getElementById('tpw')||{}).value||''; const msg=document.getElementById('tmsg');
  try{
    const res=await fetch('teacher/notes.enc',{cache:'no-store'}); if(!res.ok) throw 0;
    const b=await res.json(); const dec=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(b.salt),iterations:b.iter||200000,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(b.iv)},key,dec(b.ct));
    document.getElementById('tnotes').innerHTML=mdToHtml(new TextDecoder().decode(pt));
    if(msg){msg.hidden=true;} window.scrollTo(0,0);
  }catch(e){ if(msg){msg.hidden=false;msg.className='verdict err';
    msg.textContent='Wrong password, or notes not published yet.';} }
}
function mdToHtml(md){
  const esc2=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const lines=md.split('\n'); let out=[],inUl=false,inCode=false,buf=[];
  const flush=()=>{ if(buf.length){out.push('<p>'+buf.join(' ')+'</p>');buf=[];} };
  for(let ln of lines){
    if(ln.trim().startsWith('```')){ if(inCode){out.push('</code></pre>');inCode=false;} else {flush();out.push('<pre><code>');inCode=true;} continue; }
    if(inCode){ out.push(esc2(ln)); continue; }
    let l=esc2(ln);
    l=l.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>');
    if(/^#{1,4}\s/.test(ln)){ flush(); if(inUl){out.push('</ul>');inUl=false;} const n=ln.match(/^#+/)[0].length; out.push(`<h${n} style="margin:18px 0 6px">${l.replace(/^#+\s/,'')}</h${n}>`); continue; }
    if(/^\s*[-*]\s/.test(ln)){ flush(); if(!inUl){out.push('<ul>');inUl=true;} out.push('<li>'+l.replace(/^\s*[-*]\s/,'')+'</li>'); continue; }
    if(ln.trim()===''){ flush(); if(inUl){out.push('</ul>');inUl=false;} continue; }
    buf.push(l);
  }
  flush(); if(inUl)out.push('</ul>'); if(inCode)out.push('</code></pre>');
  return '<div class="card">'+out.join('\n')+'</div>';
}

    if(!allowed) h+=`<p class="muted small">Heads-up: that's a different track than you chose. <a onclick="go('#/track')">Switch track</a></p>`;
  } else {
    h+=`<div class="celebrate"><div class="big red">🎓 Course complete.</div>
      <p class="muted">You've shipped a full CMTAT instrument end-to-end.</p></div>`;
  }
  h+='</div>'; $('#main').innerHTML=h; window.scrollTo(0,0); renderSide(); renderMast();
  fxConfetti(!next);
}
function renderTrackChoice(){
  const tracks=C.parts.filter(p=>p.track!=='shared');
  const tiles=tracks.map(p=>{ const c=C.chapters[p.chapters[0]];
    return `<div class="tile"><div class="eyebrow">Track ${p.track}</div>
      <h4>${esc(p.title.replace(/^Track\s+\w+\s*[—-]\s*/,''))}</h4>
      <p class="muted small">${esc(c.objective.slice(0,140))}…</p>
      <button style="margin-top:10px" onclick="chooseTrack('${p.track}',${p.chapters[0]})">Choose ${p.track} →</button></div>`;}).join('');
  $('#main').innerHTML=`<div class="col"><h1 class="kick">Choose your instrument track</h1>
    <p class="muted">Each track builds one tokenized instrument to completion. The others stay available if you want them later.</p>
    <div class="grid3">${tiles}</div></div>`;
}
function chooseTrack(t,ci){ P.track=t; saveP(); go('#/ch/'+C.chapters[ci].nn); }

/* ---------- interactions ---------- */
function runChecker(chk,buf){ if(!chk||chk.type!=='regex')return true;
  try{return new RegExp(chk.pattern,(chk.flags||'m').includes('m')?'m':'').test(buf);}catch(e){return false;} }
function markDone(stepId,kind){ P.step[stepId]=kind; saveP(); }

document.addEventListener('input',e=>{
  const ta=e.target.closest('textarea[data-code]'); if(!ta)return;
  const step=ta.closest('.step'); P.code[step.dataset.id]=ta.value; saveP();
});
function enableNext(){ const nb=document.querySelector('.slidenav [data-nav=next]');
  if(nb){ nb.disabled=false; nb.classList.add('ready'); } }
document.addEventListener('click',e=>{
  const b=e.target.closest('button[data-act]'); if(!b)return;
  const step=b.closest('.step'); const id=step.dataset.id; const act=b.dataset.act;
  const ci=C.chapters.findIndex(c=>allSteps(c).some(s=>s.id===id));
  const st=allSteps(C.chapters[ci]).find(s=>s.id===id);
  const ta=$('textarea[data-code]',step), v=$('[data-v]',step), sol=$('[data-sol]',step), hb=$('[data-hint]',step);
  if(act==='sol'){ sol.hidden=false; highlightAll(); markDone(id,'reveal'); enableNext(); renderSide(); renderMast();
    step.querySelector('.tag').textContent='Revealed'; return; }
  if(act==='reviewed'){ markDone(id,'pass'); renderSide(); renderMast(); renderChapter(ci, slideI+1); return; }
  if(act==='hint'){
    hintLevel[id]=(hintLevel[id]||0)+1;
    const lvl=hintLevel[id]; let msg;
    if(lvl===1) msg='Nudge: '+(st.explanation? st.explanation.split('. ')[0]+'.' : 'Re-read the instruction and the “Why”.');
    else msg='Closer: '+(st.checker&&st.checker.error_hint && st.checker.error_hint!=='Your code should match the solution for this step.'
        ? st.checker.error_hint : 'Compare your structure against “Show solution”, then type it yourself.');
    hb.textContent=msg; hb.hidden=false; return;
  }
  if(act==='check'){
    const ok=runChecker(st.checker, ta.value);
    v.hidden=false;
    if(ok){ v.textContent='✓ Passed — press Next →'; v.className='verdict ok';
      markDone(id,'pass'); enableNext(); renderSide(); renderMast(); step.querySelector('.tag').textContent='Done ✓'; }
    else{ const hint=(st.checker&&st.checker.error_hint && st.checker.error_hint!=='Your code should match the solution for this step.')
        ? st.checker.error_hint : 'Not matching yet — try a Hint, or compare with the solution.';
      v.textContent='✗ '+hint; v.className='verdict err'; }
  }
});
// slide navigation (arrows)
document.addEventListener('click',e=>{
  const nb=e.target.closest('[data-nav]'); if(!nb||nb.disabled)return;
  const m=location.hash.match(/#\/ch\/(\d+)$/); if(!m)return;
  const ci=idxByNn(+m[1]); const c=C.chapters[ci]; const steps=allSteps(c); const S=steps.length;
  if(nb.dataset.nav==='prev'){ renderChapter(ci, slideI-1); return; }
  const st=steps[slideI];
  if(!P.step[st.id] && !st.checker){ markDone(st.id,'pass'); renderSide(); renderMast(); }
  if(slideI<S-1){ renderChapter(ci, slideI+1); }
  else if(c.quiz.length && !(P.quiz[c.nn]&&P.quiz[c.nn].done)){ go('#/ch/'+c.nn+'/quiz'); }
  else { go('#/ch/'+c.nn+'/done'); }
});
// keyboard: ←/→ to move between slides (not while typing)
document.addEventListener('keydown',e=>{
  if(!/^#\/ch\/\d+$/.test(location.hash)) return;
  const tag=(document.activeElement||{}).tagName; if(tag==='TEXTAREA'||tag==='INPUT') return;
  if(e.key==='ArrowRight'){ const b=document.querySelector('.slidenav [data-nav=next]'); if(b&&!b.disabled){e.preventDefault();b.click();} }
  if(e.key==='ArrowLeft'){ const b=document.querySelector('.slidenav [data-nav=prev]'); if(b&&!b.disabled){e.preventDefault();b.click();} }
});
</script>
