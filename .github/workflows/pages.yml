name: Deploy player to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Rebuild course.json from markdown
        run: python3 pm/build_player.py
      - uses: actions/configure-pages@v6
      - name: Upload player/ as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: player

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
